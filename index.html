<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Películas y Series - TMDB</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos propios -->
    <link href="estilos.css" rel="stylesheet">
</head>
<body>

    <div class="container py-5">

        <!-- Encabezado -->
        <div class="text-center mb-4">
            <h1 class="titulo-app">Buscador de Películas y Series</h1>
            <p class="text-muted">Consumo de la API de The Movie Database (TMDB) con jQuery</p>
        </div>

        <!-- Formulario de búsqueda -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8 col-lg-6">
                <div class="input-group input-group-lg">
                    <input type="text" id="txtBusqueda" class="form-control"
                           placeholder="Escribe el nombre de una película o serie...">
                    <button id="btnBuscar" class="btn btn-primary">Buscar</button>
                </div>
            </div>
        </div>

        <!-- Mensaje de estado (cargando / sin resultados) -->
        <div id="mensaje" class="text-center text-muted mb-4"></div>

        <!-- Contenedor de resultados (aquí jQuery insertará las cards) -->
        <div id="resultados" class="row g-4"></div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-4.0.0.js"
            integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
            crossorigin="anonymous"></script>
    <!-- Script propio -->
    <script src="script.js"></script>

</body>
</html>
